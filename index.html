<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roboklocki Cup - Football Game</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 900px;
            height: 650px;
            background: linear-gradient(to bottom, #2d6a4f 0%, #1f4d3b 100%);
            border: 3px solid #feca57;
            box-shadow: 0 0 20px rgba(254, 202, 87, 0.3);
            border-radius: 5px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI Overlay */
        #uiInfo {
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            color: white;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
            pointer-events: none;
            gap: 20px;
            padding: 6px 20px;
            border: 3px solid #feca57;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 0;
        }

        #timer {
            font-size: 20px;
            color: white;
            font-weight: 700;
            letter-spacing: 1px;
        }

        #score {
            font-size: 16px;
            color: white;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            gap: 10px;
        }

        .score-team {
            font-weight: 700;
            font-size: 16px;
        }

        .team-red {
            color: #ff6b6b;
        }

        .team-blue {
            color: #54a0ff;
        }

        /* Lobby Screen */
        #lobby {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.98);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 100;
            border: 3px solid #feca57;
            min-width: 400px;
            box-shadow: 0 0 30px rgba(254, 202, 87, 0.4);
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                transform: translate(-50%, -60%);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%);
                opacity: 1;
            }
        }

        #lobby h1 {
            color: #feca57;
            font-size: 36px;
            margin-bottom: 12px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
        }

        #lobby .subtitle {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
        }

        #lobby input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #444;
            border-radius: 8px;
            font-size: 16px;
            background: #222;
            color: white;
            text-align: center;
            transition: border-color 0.3s;
        }

        #lobby input:focus {
            outline: none;
            border-color: #feca57;
        }

        #lobby button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-p1 {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: white;
        }

        .btn-p1:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-p2 {
            background: linear-gradient(135deg, #54a0ff 0%, #2979e2 100%);
            color: white;
        }

        .btn-p2:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(84, 160, 255, 0.4);
        }

        #status {
            margin-top: 12px;
            color: #feca57;
            font-size: 14px;
            min-height: 20px;
        }

        /* Game Over Screen */
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.98);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 100;
            border: 3px solid #feca57;
            min-width: 400px;
            display: none;
            box-shadow: 0 0 30px rgba(254, 202, 87, 0.4);
        }

        #gameOver h1 {
            color: #feca57;
            font-size: 36px;
            margin-bottom: 20px;
        }

        #gameOver .final-score {
            font-size: 32px;
            margin: 20px 0;
            color: white;
        }

        #gameOver button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: linear-gradient(135deg, #feca57 0%, #f9b633 100%);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            transition: all 0.3s;
        }

        #gameOver button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(254, 202, 87, 0.4);
        }

        /* Branding */
        .branding {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 11px;
            color: #aaa;
            text-align: right;
            pointer-events: none;
        }

        /* Connection Status */
        #connectionStatus {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 12px;
            color: #feca57;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 10px;
            border-radius: 5px;
            z-index: 5;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        .status-connected {
            background: #2ecc71;
        }

        .status-waiting {
            background: #f39c12;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

                <span class="score-team team-red">Czerwoni <span id="scoreP1">0</span></span>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAGlGNXNtg3OJy4tTr0M4dmOU_bT-0Bci8",
            authDomain: "football-game-1-7e0ee.firebaseapp.com",
            databaseURL: "https://football-game-1-7e0ee-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "football-game-1-7e0ee",
            storageBucket: "football-game-1-7e0ee.firebasestorage.app",
            messagingSenderId: "581783599070",
            appId: "1:581783599070:web:d3fe6238cca28e2afe0f4f",
            measurementId: "G-5VR37TE74C"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = 900;
        canvas.height = 650;

        const ballImage = new Image();
        ballImage.src = 'assets/ball.png';

        let gameState = {
            isGameStarted: false,
            isFrozen: false,
            isGameOver: false,
            roomId: null,
            playerRole: null,
            gameTimer: 120,
            score: { p1: 0, p2: 0 },
            ballMaster: 'p1',
            isGoalProcess: false
        };

        class Ball {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 10;
                this.vx = 0;
                this.vy = 0;
                this.mass = 0.43;
                this.friction = 0.985;
                this.bounce = 0.7;
                this.angularVelocity = 0;
                this.spin = 0;
                this.lastSyncTime = Date.now();
                this.gravity = 0;
                this.airResistance = 0.95; 
                this.hasCollided = false;
                this.inGoal = false;
            }

            update() {
                this.vx *= this.airResistance;
                this.vy *= this.airResistance;

                if (Math.abs(this.spin) > 0) {
                    this.spin *= 0.99;
                }

                let speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
                const maxBallSpeed = 100; 
                if (speed > maxBallSpeed) {
                    const scale = maxBallSpeed / speed;
                    this.vx *= scale;
                    this.vy *= scale;
                }

                this.x += this.vx;
                this.y += this.vy;

                this.hasCollided = false;

                if (this.y - this.radius < 50 && this.x > 33 && this.x < 867) {
                    this.y = this.radius + 50;
                    this.vy *= -this.bounce;
                    this.vy = Math.max(this.vy, 3.5);
                }
                if (this.y + this.radius > 600 && this.x > 33 && this.x < 867) {
                    this.y = 600 - this.radius;
                    this.vy *= -this.bounce * 0.8;
                    this.vy = Math.min(this.vy, -3.5);
                }

                if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -this.bounce;
                }
                if (this.x + this.radius > 900) {
                    this.x = 900 - this.radius;
                    this.vx *= -this.bounce;
                }

                if (this.x - this.radius < 33 && this.x > 0 && (this.y < 252 || this.y > 398)) {
                    this.x = this.radius + 33;
                    this.vx = Math.abs(this.vx) * 0.8;
                }
                if (this.x + this.radius > 867 && this.x < 900 && (this.y < 252 || this.y > 398)) {
                    this.x = 867 - this.radius;
                    this.vx = -Math.abs(this.vx) * 0.8;
                }

                if (Math.abs(this.vx) < 0.15) this.vx = 0;
                if (Math.abs(this.vy) < 0.15) this.vy = 0;
            }

            collideWithPlayer(player) {
                if (this.hasCollided) return false;

                const dx = this.x - player.x;
                const dy = this.y - player.y;
                const dist = Math.sqrt(dx ** 2 + dy ** 2);
                const minDist = this.radius + player.radius;

                if (dist < minDist && dist > 0) {
                    const nx = dx / dist;
                    const ny = dy / dist;

                    const dvx = this.vx - player.vx;
                    const dvy = this.vy - player.vy;
                    const dvDot = dvx * nx + dvy * ny;

                    if (dvDot < 0) {
                        const restitution = 0.35;
                        let impulse = -(1 + restitution) * dvDot / (1 / this.mass + 1 / player.mass);
                        impulse = Math.min(impulse, 3.5);
                        
                        this.vx = this.vx - impulse * (1 / this.mass) * nx * 0.25;
                        this.vy = this.vy - impulse * (1 / this.mass) * ny * 0.25;
                        
                        const escapeVelocity = 10; 
                        const currentOutwardVelocity = (this.vx * nx + this.vy * ny);
                        if (currentOutwardVelocity < escapeVelocity) {
                            this.vx = this.vx + (escapeVelocity - currentOutwardVelocity) * nx;
                            this.vy = this.vy + (escapeVelocity - currentOutwardVelocity) * ny;
                        }
                        
                        player.vx = player.vx + impulse * (1 / player.mass) * nx * 0.08;
                        player.vy = player.vy + impulse * (1 / player.mass) * ny * 0.08;

                        this.spin = dvDot * 0.002;

                        const overlap = minDist - dist;
                        const separationFactor = overlap + 2.0; 
                        this.x += separationFactor * nx;
                        this.y += separationFactor * ny;

                        this.hasCollided = true;
                        return true;
                    }
                }
                return false;
            }

            draw(ctx) {
                if (ballImage.complete && ballImage.naturalHeight !== 0) {
                    ctx.save();
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.clip();
                    const size = this.radius * 2;
                    ctx.drawImage(ballImage, this.x - this.radius, this.y - this.radius, size, size);
                    ctx.restore();
                } else {
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.strokeStyle = '#999999';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        class Player {
            constructor(x, y, color, role) {
                this.x = x;
                this.y = y;
                this.radius = 18;
                this.vx = 0;
                this.vy = 0;
                this.color = color;
                this.role = role;
                this.mass = 5;
                this.friction = 0.88;
                this.maxSpeed = 270; 
            }

            update() {
                this.vx *= this.friction;
                this.vy *= this.friction;

                const speed = Math.sqrt(this.vx ** 2 + this.vy ** 2);
                if (speed > this.maxSpeed) {
                    const scale = this.maxSpeed / speed;
                    this.vx *= scale;
                    this.vy *= scale;
                }

                this.x += this.vx * (1 / 60);
                this.y += this.vy * (1 / 60);

                // Границы игрового поля
                if (this.x - this.radius < 0) this.x = this.radius;
                if (this.x + this.radius > 900) this.x = 900 - this.radius;
                // Горизонтальные границы (y=50 и y=600) - ОНА срабатывают только от x=33 до x=867
                if (this.y - this.radius < 50 && this.x > 33 && this.x < 867) this.y = this.radius + 50;
                if (this.y + this.radius > 600 && this.x > 33 && this.x < 867) this.y = 600 - this.radius;

                // Вертикальные внутренние границы (x=33 и x=867) - ТОЛЬКО вне зоны ворот
                // Левая линия (x=33): от y=50 до y=252 и от y=398 до y=600
                if (this.x - this.radius < 33 && (this.y < 252 || this.y > 398)) this.x = this.radius + 33;
                // Правая линия (x=867): от y=50 до y=252 и от y=398 до y=600
                if (this.x + this.radius > 867 && (this.y < 252 || this.y > 398)) this.x = 867 - this.radius;
            }

            collideWithPlayer(other) {
                const dx = this.x - other.x;
                const dy = this.y - other.y;
                const dist = Math.sqrt(dx ** 2 + dy ** 2);
                const minDist = this.radius + other.radius;

                if (dist < minDist && dist > 0) {
                    const nx = dx / dist;
                    const ny = dy / dist;

                    const dvx = this.vx - other.vx;
                    const dvy = this.vy - other.vy;
                    const dvDot = dvx * nx + dvy * ny;

                    if (dvDot < 0) {
                        const impulse = (dvDot / (this.mass + other.mass)) * 0.5; 
                        this.vx -= impulse * other.mass * nx;
                        this.vy -= impulse * other.mass * ny;
                        other.vx += impulse * this.mass * nx;
                        other.vy += impulse * this.mass * ny;

                        const overlap = minDist - dist + 0.1; 
                        const separation = overlap / 2 + 1;
                        this.x += separation * nx;
                        this.y += separation * ny;
                        other.x -= separation * nx;
                        other.y -= separation * ny;
                    }
                }
            }

            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();

                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.role === 'p1' ? '1' : '2', this.x, this.y);
            }
        }

        let ball = new Ball(450, 325);
        let p1 = new Player(155, 325, '#ff6b6b', 'p1');
        let p2 = new Player(745, 325, '#54a0ff', 'p2');

        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        function handlePlayerInput(player) {
            const acceleration = 100; 
            
            if (keys['arrowleft'] || keys['a']) player.vx -= acceleration;
            if (keys['arrowright'] || keys['d']) player.vx += acceleration;
            if (keys['arrowup'] || keys['w']) player.vy -= acceleration;
            if (keys['arrowdown'] || keys['s']) player.vy += acceleration;
            
            const speed = Math.sqrt(player.vx ** 2 + player.vy ** 2);
            if (speed > player.maxSpeed) {
                const scale = player.maxSpeed / speed;
                player.vx *= scale;
                player.vy *= scale;
            }
        }

        function drawField() {
            ctx.fillStyle = '#2d6a4f';
            ctx.fillRect(0, 0, 900, 650);

            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(450, 50);
            ctx.lineTo(450, 600);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(450, 325, 65, 0, Math.PI * 2);
            ctx.stroke();

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(450, 325, 4, 0, Math.PI * 2);
            ctx.fill();

            // Внутренние границы (на расстоянии 33 пикселя от края)
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            
            // Левая вертикальная линия
            ctx.beginPath();
            ctx.moveTo(33, 50);
            ctx.lineTo(33, 600);
            ctx.stroke();
            
            // Правая вертикальная линия
            ctx.beginPath();
            ctx.moveTo(867, 50);
            ctx.lineTo(867, 600);
            ctx.stroke();
            
            // Верхняя горизонтальная линия
            ctx.beginPath();
            ctx.moveTo(33, 50);
            ctx.lineTo(867, 50);
            ctx.stroke();
            
            // Нижняя горизонтальная линия
            ctx.beginPath();
            ctx.moveTo(33, 600);
            ctx.lineTo(867, 600);
            ctx.stroke();

            // ======== ШТРАФНЫЕ ЗОНЫ (ДВОЙНЫЕ ПРЯМОУГОЛЬНИКИ) ========
            // Левая большая штрафная зона
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.rect(33, 195, 100, 260);
            ctx.stroke();

            // Левая малая штрафная зона (goal area) - до точки пенальти
            ctx.beginPath();
            ctx.rect(33, 240, 50, 170);
            ctx.stroke();

            // Правая большая штрафная зона
            ctx.beginPath();
            ctx.rect(767, 195, 100, 260);
            ctx.stroke();

            // Правая малая штрафная зона (goal area) - до точки пенальти
            ctx.beginPath();
            ctx.rect(817, 240, 50, 170);
            ctx.stroke();

            // ======== ТОЧКИ ПЕНАЛЬТИ (между зонами на одинаковом расстоянии) ========
            // Левая точка пенальти
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(108, 325, 3, 0, Math.PI * 2);
            ctx.fill();

            // Правая точка пенальти
            ctx.beginPath();
            ctx.arc(792, 325, 3, 0, Math.PI * 2);
            ctx.fill();

            // ======== ЗАКРУГЛЕННЫЕ ЛИНИИ НА УГЛАХ ========
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2;

            // Левый верхний угол
            ctx.beginPath();
            ctx.arc(33, 50, 15, 0, Math.PI / 2);
            ctx.stroke();

            // Левый нижний угол
            ctx.beginPath();
            ctx.arc(33, 600, 15, -Math.PI / 2, 0);
            ctx.stroke();

            // Правый верхний угол
            ctx.beginPath();
            ctx.arc(867, 50, 15, Math.PI / 2, Math.PI);
            ctx.stroke();

            // Правый нижний угол
            ctx.beginPath();
            ctx.arc(867, 600, 15, Math.PI, 3 * Math.PI / 2);
            ctx.stroke();
        }

        function checkGoalPostsCollision() {
            // Левые ворота
            // Левая внешняя штанга (x=0) - вертикальная стойка
            if (ball.x - ball.radius < 5 && ball.y > 245 && ball.y < 405) {
                ball.x = ball.radius + 5;
                ball.vx = Math.abs(ball.vx) * 0.8;
            }
            if (p1.x - p1.radius < 5 && p1.y > 245 && p1.y < 405) {
                p1.x = p1.radius + 5;
                p1.vx = Math.max(10, Math.abs(p1.vx));
            }
            if (p2.x - p2.radius < 5 && p2.y > 245 && p2.y < 405) {
                p2.x = p2.radius + 5;
                p2.vx = Math.max(10, Math.abs(p2.vx));
            }

            // Правые ворота
            // Правая внешняя штанга (x=900) - вертикальная стойка
            if (ball.x + ball.radius > 895 && ball.y > 245 && ball.y < 405) {
                ball.x = 895 - ball.radius;
                ball.vx = -Math.abs(ball.vx) * 0.8;
            }
            if (p1.x + p1.radius > 895 && p1.y > 245 && p1.y < 405) {
                p1.x = 895 - p1.radius;
                p1.vx = -Math.max(10, Math.abs(p1.vx));
            }
            if (p2.x + p2.radius > 895 && p2.y > 245 && p2.y < 405) {
                p2.x = 895 - p2.radius;
                p2.vx = -Math.max(10, Math.abs(p2.vx));
            }

            // Левые ворота - верхняя перекладина (y=252)
            // Мяч
            if (ball.y - ball.radius < 257 && ball.y > 200 && ball.x >= 0 && ball.x < 35) {
                ball.y = 257 + ball.radius;
                ball.vy = Math.max(Math.abs(ball.vy) * 0.8, 3);
            }
            // Игрок 1
            if (p1.y - p1.radius < 257 && p1.y > 200 && p1.x >= 0 && p1.x < 35) {
                p1.y = 257 + p1.radius;
                p1.vy = Math.max(Math.abs(p1.vy), 10);
            }
            // Игрок 2
            if (p2.y - p2.radius < 257 && p2.y > 200 && p2.x >= 0 && p2.x < 35) {
                p2.y = 257 + p2.radius;
                p2.vy = Math.max(Math.abs(p2.vy), 10);
            }

            // Левые ворота - нижняя перекладина (y=398)
            // Мяч
            if (ball.y + ball.radius > 393 && ball.y < 450 && ball.x >= 0 && ball.x < 35) {
                ball.y = 393 - ball.radius;
                ball.vy = -Math.max(Math.abs(ball.vy) * 0.8, 3);
            }
            // Игрок 1
            if (p1.y + p1.radius > 393 && p1.y < 450 && p1.x >= 0 && p1.x < 35) {
                p1.y = 393 - p1.radius;
                p1.vy = -Math.max(Math.abs(p1.vy), 10);
            }
            // Игрок 2
            if (p2.y + p2.radius > 393 && p2.y < 450 && p2.x >= 0 && p2.x < 35) {
                p2.y = 393 - p2.radius;
                p2.vy = -Math.max(Math.abs(p2.vy), 10);
            }

            // Правые ворота - верхняя перекладина (y=252)
            // Мяч
            if (ball.y - ball.radius < 257 && ball.y > 200 && ball.x > 865 && ball.x <= 900) {
                ball.y = 257 + ball.radius;
                ball.vy = Math.max(Math.abs(ball.vy) * 0.8, 3);
            }
            // Игрок 1
            if (p1.y - p1.radius < 257 && p1.y > 200 && p1.x > 865 && p1.x <= 900) {
                p1.y = 257 + p1.radius;
                p1.vy = Math.max(Math.abs(p1.vy), 10);
            }
            // Игрок 2
            if (p2.y - p2.radius < 257 && p2.y > 200 && p2.x > 865 && p2.x <= 900) {
                p2.y = 257 + p2.radius;
                p2.vy = Math.max(Math.abs(p2.vy), 10);
            }

            // Правые ворота - нижняя перекладина (y=398)
            // Мяч
            if (ball.y + ball.radius > 393 && ball.y < 450 && ball.x > 865 && ball.x <= 900) {
                ball.y = 393 - ball.radius;
                ball.vy = -Math.max(Math.abs(ball.vy) * 0.8, 3);
            }
            // Игрок 1
            if (p1.y + p1.radius > 393 && p1.y < 450 && p1.x > 865 && p1.x <= 900) {
                p1.y = 393 - p1.radius;
                p1.vy = -Math.max(Math.abs(p1.vy), 10);
            }
            // Игрок 2
            if (p2.y + p2.radius > 393 && p2.y < 450 && p2.x > 865 && p2.x <= 900) {
                p2.y = 393 - p2.radius;
                p2.vy = -Math.max(Math.abs(p2.vy), 10);
            }
        }

        function checkGoal() {
            if (!gameState.isFrozen) {
                // Левые ворота - гол p2 (красный игрок пропустил)
                if (ball.x - ball.radius <= 10 && ball.y > 252 && ball.y < 398 && ball.vx < 0) {
                    if (!ball.inGoal) {
                        ball.inGoal = true;
                        gameState.score.p2++;
                        triggerGoal();
                    }
                }
                // Правые ворота - гол p1 (синий игрок пропустил)
                else if (ball.x + ball.radius >= 890 && ball.y > 252 && ball.y < 398 && ball.vx > 0) {
                    if (!ball.inGoal) {
                        ball.inGoal = true;
                        gameState.score.p1++;
                        triggerGoal();
                    }
                }
                // Сбросить флаг если мяч вышел из зоны ворот
                else if (ball.x > 50 && ball.x < 850) {
                    ball.inGoal = false;
                }
            }
        }

        function triggerGoal() {
            gameState.isFrozen = true;
            gameState.isGoalProcess = true;

            document.getElementById('scoreP1').innerText = gameState.score.p1;
            document.getElementById('scoreP2').innerText = gameState.score.p2;

            if (gameState.playerRole === 'p1') {
                database.ref(`rooms/${gameState.roomId}/score`).set(gameState.score);
            }

            setTimeout(() => {
                resetPositions();
                gameState.isFrozen = false;
                gameState.isGoalProcess = false;
            }, 2000);
        }

        function resetPositions() {
            p1.x = 155; p1.y = 325; p1.vx = 0; p1.vy = 0;
            p2.x = 745; p2.y = 325; p2.vx = 0; p2.vy = 0;
            ball.x = 450; ball.y = 325; ball.vx = 0; ball.vy = 0;
            ball.inGoal = false; // Сбросить флаг гола

            if (gameState.playerRole === 'p1') {
                database.ref(`rooms/${gameState.roomId}`).update({
                    p1: { x: 155, y: 325, vx: 0, vy: 0 },
                    p2: { x: 745, y: 325, vx: 0, vy: 0 },
                    ball: { x: 450, y: 325, vx: 0, vy: 0, master: 'p1' }
                });
            } else {
                // p2 тоже отправляет обновление
                database.ref(`rooms/${gameState.roomId}`).update({
                    p2: { x: 750, y: 325, vx: 0, vy: 0 }
                });
            }
        }

        let lastSyncTime = Date.now();

        function drawGoalNets() {
            // Левые ворота - штанги и сетка
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            
            // Левая вертикальная стойка (внешняя, полная)
            ctx.beginPath();
            ctx.moveTo(0, 252);
            ctx.lineTo(0, 398);
            ctx.stroke();

            // Верхняя горизонтальная перекладина
            ctx.beginPath();
            ctx.moveTo(0, 252);
            ctx.lineTo(33, 252);
            ctx.stroke();

            // Правая вертикальная стойка (внутренняя, полная)
            ctx.beginPath();
            ctx.moveTo(33, 252);
            ctx.lineTo(33, 398);
            ctx.stroke();

            // Нижняя горизонтальная перекладина
            ctx.beginPath();
            ctx.moveTo(0, 398);
            ctx.lineTo(33, 398);
            ctx.stroke();

            // Белые точки в углах
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(0, 252, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(33, 252, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(0, 398, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(33, 398, 3, 0, Math.PI * 2);
            ctx.fill();

            // Правые ворота - штанги и сетка
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            
            // Левая вертикальная стойка (на границе поля)
            ctx.beginPath();
            ctx.moveTo(867, 252);
            ctx.lineTo(867, 398);
            ctx.stroke();

            // Верхняя горизонтальная перекладина
            ctx.beginPath();
            ctx.moveTo(867, 252);
            ctx.lineTo(900, 252);
            ctx.stroke();

            // Правая вертикальная стойка (внешняя)
            ctx.beginPath();
            ctx.moveTo(900, 252);
            ctx.lineTo(900, 398);
            ctx.stroke();

            // Нижняя горизонтальная перекладина
            ctx.beginPath();
            ctx.moveTo(867, 398);
            ctx.lineTo(900, 398);
            ctx.stroke();

            // Белые точки в углах
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(867, 252, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(900, 252, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(867, 398, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(900, 398, 3, 0, Math.PI * 2);
            ctx.fill();

            // Сетка левых ворот
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1;
            // Вертикальные линии сетки
            for (let x = 4; x < 33; x += 5) {
                ctx.beginPath();
                ctx.moveTo(x, 252);
                ctx.lineTo(x, 398);
                ctx.stroke();
            }
            // Горизонтальные линии сетки
            for (let y = 257; y < 398; y += 5) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(33, y);
                ctx.stroke();
            }

            // Сетка правых ворот
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1;
            // Вертикальные линии сетки
            for (let x = 871; x < 900; x += 5) {
                ctx.beginPath();
                ctx.moveTo(x, 252);
                ctx.lineTo(x, 398);
                ctx.stroke();
            }
            // Горизонтальные линии сетки
            for (let y = 257; y < 398; y += 5) {
                ctx.beginPath();
                ctx.moveTo(867, y);
                ctx.lineTo(900, y);
                ctx.stroke();
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, 900, 650);

            if (!gameState.isGameStarted || !gameState.playerRole) {
                drawField();
                drawGoalNets();
                requestAnimationFrame(gameLoop);
                return;
            }

            drawField();

            // Если игра закончилась, просто рисуем, но не обновляем
            if (gameState.isGameOver) {
                p1.draw(ctx);
                p2.draw(ctx);
                ball.draw(ctx);
                drawGoalNets();
                requestAnimationFrame(gameLoop);
                return;
            }

            const currentPlayer = gameState.playerRole === 'p1' ? p1 : p2;
            if (!gameState.isFrozen) {
                handlePlayerInput(currentPlayer);
            }

            if (!gameState.isFrozen) {
                p1.update();
                p2.update();
                ball.update();

                for (let i = 0; i < 2; i++) {
                    p1.collideWithPlayer(p2);
                    ball.collideWithPlayer(p1);
                    ball.collideWithPlayer(p2);
                }
                checkGoalPostsCollision();
                checkGoal();
            }

            p1.draw(ctx);
            p2.draw(ctx);
            ball.draw(ctx);
            drawGoalNets();

            const now = Date.now();
            if (now - lastSyncTime > 50) {
                if (gameState.playerRole === 'p1') {
                    database.ref(`rooms/${gameState.roomId}/p1`).set({
                        x: p1.x, y: p1.y, vx: p1.vx, vy: p1.vy
                    });
                    database.ref(`rooms/${gameState.roomId}/ball`).set({
                        x: ball.x, y: ball.y, vx: ball.vx, vy: ball.vy
                    });
                } else {
                    database.ref(`rooms/${gameState.roomId}/p2`).set({
                        x: p2.x, y: p2.y, vx: p2.vx, vy: p2.vy
                    });
                }
                lastSyncTime = now;
            }

            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        function join(role) {
            gameState.playerRole = role;
            gameState.roomId = document.getElementById('roomInput').value.trim() || 'WKS';
            const roomRef = database.ref(`rooms/${gameState.roomId}`);

            if (role === 'p1') {
                roomRef.update({
                    gameState: 'waiting',
                    timeLeft: 120,
                    score: { p1: 0, p2: 0 },
                    ball: { x: 450, y: 325, vx: 0, vy: 0, master: 'p1' },
                    'connections/p1': true
                });
            }

            roomRef.child(`connections/${role}`).set(true);
            roomRef.child(`connections/${role}`).onDisconnect().remove();

            roomRef.on('value', (snap) => {
                const data = snap.val();
                if (!data) return;

                if (data.connections?.p1 && data.connections?.p2 && !gameState.isGameStarted) {
                    gameState.isGameStarted = true;
                    document.getElementById('lobby').style.display = 'none';
                    document.getElementById('connectionStatus').innerHTML = 
                        '<span class="status-dot status-connected"></span><span>Połączono</span>';
                    resetPositions();
                }

                if (data.score) {
                    gameState.score = data.score;
                    document.getElementById('scoreP1').innerText = data.score.p1;
                    document.getElementById('scoreP2').innerText = data.score.p2;
                }

                if (data.timeLeft !== undefined) {
                    gameState.gameTimer = data.timeLeft;
                    const m = Math.floor(data.timeLeft / 60);
                    const s = data.timeLeft % 60;
                    document.getElementById('timer').innerText = 
                        `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;

                    if (data.timeLeft === 0 && !gameState.isGameOver) {
                        endGame();
                    }
                }

                // Всегда обновляем позиции врага из Firebase (даже при isFrozen для синхронизации после гола)
                const enemy = gameState.playerRole === 'p1' ? 'p2' : 'p1';
                const enemyObj = gameState.playerRole === 'p1' ? p2 : p1;
                if (data[enemy]) {
                    enemyObj.x = data[enemy].x;
                    enemyObj.y = data[enemy].y;
                    enemyObj.vx = data[enemy].vx || 0;
                    enemyObj.vy = data[enemy].vy || 0;
                }

                if (!gameState.isFrozen) {
                    if (data.ball && gameState.playerRole !== 'p1') {
                        ball.x = data.ball.x;
                        ball.y = data.ball.y;
                        ball.vx = data.ball.vx || 0;
                        ball.vy = data.ball.vy || 0;
                    }
                }
            });

            document.getElementById('status').innerText = 'Czekanie na drugiego gracza...';
        }

        function endGame() {
            gameState.isGameOver = true;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('finalP1').innerText = gameState.score.p1;
            document.getElementById('finalP2').innerText = gameState.score.p2;

            let whoWonText = '';
            if (gameState.score.p1 > gameState.score.p2) {
                whoWonText = '🔴 WYGRYWA GRACZ 1 (CZERWONY)';
            } else if (gameState.score.p2 > gameState.score.p1) {
                whoWonText = '🔵 WYGRYWA GRACZ 2 (NIEBIESKI)';
            } else {
                whoWonText = '⚪ REMIS!';
            }
            document.getElementById('whoWon').innerText = whoWonText;
        }

        document.getElementById('joinP1').onclick = () => join('p1');
        document.getElementById('joinP2').onclick = () => join('p2');
        document.getElementById('playAgain').onclick = () => { location.reload(); };

        setInterval(() => {
            if (gameState.isGameStarted && !gameState.isGameOver && gameState.playerRole === 'p1') {
                gameState.gameTimer--;
                database.ref(`rooms/${gameState.roomId}/timeLeft`).set(gameState.gameTimer);
            }
        }, 1000);
    </script>
</body>
